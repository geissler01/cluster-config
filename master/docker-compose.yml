version: '3.8'

# ==============================================================================
# X-AIRFLOW-COMMON: ANCLA YAML (Plantilla Base)
# Esto actúa como una plantilla. Todos los servicios de abajo "heredarán" esto.
# ==============================================================================
x-airflow-common: &airflow-common
  build:
    # MUY IMPORTANTE: El contexto ".." significa que Docker saldrá de la carpeta 'master/' 
    # y buscará el Dockerfile en la raíz '/opt/data-cluster/'.
    context: ..
    args:
      # Pasa la variable del .env al Dockerfile durante la compilación
      EXTRA_REQUIREMENTS: ${EXTRA_REQUIREMENTS}
  env_file:
    # Como el .env estará en la raíz (recomendado) o en master, ajusta esta ruta. 
    # Aquí asumimos que el .env lo pusiste junto a este docker-compose.
    - .env
  environment:
    - PYTHONPATH=${PYTHONPATH}
  # Usa el usuario 50000 del sistema
  user: "${AIRFLOW_UID:-50000}:0"
  volumes:
    # Ruta ABSOLUTA de tu EC2 : Ruta interna del contenedor
    # MAPEO DE VOLÚMENES: Izquierda es la máquina Host (EC2), Derecha es el contenedor interno.
    # Ruta EC2 : Ruta Contenedor : Permiso (ro = read-only)
    - /opt/dags-alzheimer/dags:/opt/airflow/dags:ro
    - ./logs:/opt/airflow/logs
    - ./config:/opt/airflow/config
    - /opt/dags-alzheimer/plugins:/opt/airflow/plugins:ro

services:
  # ==============================================================================
  # 1. AIRFLOW-INIT (El Contenedor Desechable)
  # Solo corre al inicio para crear las tablas en Postgres. Cuando termina, se apaga.
  # ==============================================================================
  airflow-init:
    <<: *airflow-common
    container_name: airflow-init
    entrypoint: /bin/bash # ignora entrypoint de airflow por defecto temporalmente para crear las carpetas
    # abre una terminal bash
    user: "0:0" # Ejecuta como root temporalmente para crear carpetas
    # environment:
    #   - _AIRFLOW_DB_MIGRATE=true # Gana y sobrescribe el "false" del .env
    #   # si esto estuviera en false no se crearia la base de datos y no podria usar airflow
    #   # porque airflow necesita una base de datos para almacenar los metadatos de los dags
    #   # los usuarios, las conexiones, variables, etc.
    command:
      - -c
      - |
        set -e # si un comando falla, se detiene el script

        # Crea las carpetas físicamente si no existen
        echo "Creating Airflow directories..."
        mkdir -p /opt/airflow/{logs,dags,plugins,config}

        # Les da propiedad al usuario 50000
        echo "Configuring permissions..."
        chown -R "${AIRFLOW_UID}:0" /opt/airflow

        # hacemos la migración a la nueva versión de airflow (AIRFLOW 3)
        echo "Running database migrations..."
        # No usamos exec para que el sleep funcione 
        /entrypoint airflow db migrate 

        echo "Waiting for database to stabilize..."
        sleep 10

        echo "Migration completed."

  # ==============================================================================
  # 2. AIRFLOW-APISERVER (El Nuevo Frontend y Backend de Airflow 3)
  # Reemplaza al antiguo 'webserver'. Sirve la UI en React y la API REST.
  # ==============================================================================
  airflow-apiserver:
    <<: *airflow-common
    container_name: airflow-api-server
    command: |
      # espera hasta que la base de datos esté disponible y luego inicia el servidor
      bash -c "
        until airflow db check; do
          echo 'Waiting for metadata DB...'
          sleep 2
        done
        exec airflow api-server
      "
    ports:
      - "8080:8080" # Exponemos en el 8080 para que el Nginx Proxy siga funcionando
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # ==============================================================================
  # 4. AIRFLOW-SCHEDULER (El Cerebro)
  # Revisa los horarios de los DAGs y manda las tareas a RabbitMQ.
  # ==============================================================================
  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow-scheduler
    command: >
      bash -c "
        until airflow db check; do
          echo 'Waiting for metadata DB...'
          sleep 2
        done

        exec airflow scheduler
      "
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # ==============================================================================
  # 5. AIRFLOW-DAG-PROCESSOR (El Lector de Código)
  # Se encarga EXCLUSIVAMENTE de leer los archivos .py de la carpeta dags y parsearlos.
  # ==============================================================================
  airflow-dag-processor:
    <<: *airflow-common
    container_name: airflow-dag-processor
    command: >
      bash -c "
        until airflow db check; do
          echo 'Waiting for metadata DB...'
          sleep 2
        done

        exec airflow dag-processor
      "
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # ==============================================================================
  # 6. AIRFLOW-TRIGGERER (Ahorro de Cómputo)
  # Maneja los "Sensores Diferidos" (tareas que solo esperan a que pase algo).
  # ==============================================================================
  airflow-triggerer:
    <<: *airflow-common
    container_name: airflow-triggerer
    command: >
      bash -c "
        until airflow db check; do
          echo 'Waiting for metadata DB...'
          sleep 2
        done

        exec airflow triggerer
      "
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # ==============================================================================
  # 7. FLOWER (Monitor de RabbitMQ y Celery)
  # UI gráfica para ver en tiempo real qué Worker está haciendo qué tarea.
  # ==============================================================================
  flower:
    <<: *airflow-common
    container_name: airflow-flower
    command: >
      bash -c "
        until airflow db check; do
          echo 'Waiting for metadata DB...'
          sleep 2
        done

        exec celery flower
      "
    ports:
      - "5555:5555" # Apuntaremos el subdominio orion-flower a este puerto
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully
